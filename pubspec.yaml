name: nubar
description: "Kürtlerin içerik paylaşabileceği, okuyabileceği, tartışabileceği ve topluluk kurabileceği; PDF, video ve forum özelliklerini bir arada sunan Kürt kültürü odaklı dijital platform."
publish_to: 'none'

version: 1.0.0+1

dependency_overrides:
  intl: 0.20.2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.0.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # PDF
  syncfusion_flutter_pdfviewer: ^23.1.0
  file_picker: ^8.0.4

  # Video
  video_player: ^2.8.0
  chewie: ^1.7.0

  # Image
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4

  # HTTP (Backblaze)
  http: ^1.1.0
  dio: ^5.3.0

  # UI & UX
  infinite_scroll_pagination: ^4.0.0
  timeago: ^3.6.0
  share_plus: ^7.2.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0

  # Utils
  intl: ^0.18.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.0
  flutter_dotenv: ^5.1.0
  flutter_quill: ^11.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/images/
    - assets/icons/

# Uygulama ikonu: assets/icons/icon.png (dağ keçisi / Nûbar)
flutter_launcher_icons:
  image_path: "assets/icons/icon.png"
  android: true
  ios: true
  min_sdk_android: 21
